</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">MARGIN CALCULATOR</div><h1>마진 <span>계산기</span></h1><p>매출이익·영업이익·순이익 마진율을 계산합니다</p></div>
<div class="two-col"><div class="card anim-1"><div class="card-title">수익 정보</div>
<div class="field"><label>매출액</label><div class="input-wrap"><input type="number" id="rev" value="100000000" step="1000000"><span class="unit">원</span></div></div>
<div class="field"><label>매출원가 (COGS)</label><div class="input-wrap"><input type="number" id="cogs" value="60000000" step="1000000"><span class="unit">원</span></div></div>
<div class="field"><label>판관비 (운영비용)</label><div class="input-wrap"><input type="number" id="opex" value="20000000" step="1000000"><span class="unit">원</span></div></div>
<div class="field"><label>세금</label><div class="input-wrap"><input type="number" id="tax" value="5000000" step="500000"><span class="unit">원</span></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">💹</div><div>수익 정보를 입력하고 계산하세요</div></div></div></div>
<script>
function fw(n){if(n>=100000000)return(n/100000000).toFixed(1)+'억원';if(n>=10000)return Math.round(n/10000).toLocaleString()+'만원';return Math.round(n).toLocaleString()+'원'}
function calc(){
  const rev=+document.getElementById('rev').value,cogs=+document.getElementById('cogs').value,opex=+document.getElementById('opex').value,tax=+document.getElementById('tax').value;
  const gross=rev-cogs,op=gross-opex,net=op-tax;
  const gm=((gross/rev)*100).toFixed(1),om=((op/rev)*100).toFixed(1),nm=((net/rev)*100).toFixed(1);
  document.getElementById('res').innerHTML=`<div class="card-title">마진 계산 결과</div><div class="result-hero r2"><div class="ri hl"><div class="rl">매출총이익</div><div class="rv">${fw(gross)}</div><div class="rs">마진율 ${gm}%</div></div><div class="ri info"><div class="rl">영업이익</div><div class="rv">${fw(op)}</div><div class="rs">마진율 ${om}%</div></div><div class="ri gold"><div class="rl">순이익</div><div class="rv">${fw(net)}</div><div class="rs">마진율 ${nm}%</div></div><div class="ri ${net<0?'danger':''}"><div class="rl">손익 여부</div><div class="rv">${net>=0?'✅ 흑자':'❌ 적자'}</div></div></div>`
}calc();</script><!-- ADSENSE
