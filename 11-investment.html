</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">INVESTMENT RETURN</div><h1>투자 수익 <span>계산기</span></h1><p>원금·기간·수익률로 미래 투자 수익을 계산합니다</p></div>
<div class="two-col"><div class="card anim-1"><div class="card-title">투자 정보</div>
<div class="field"><label>초기 투자금</label><div class="input-wrap"><input type="number" id="p" value="5000000" step="500000"><span class="unit">원</span></div></div>
<div class="field"><label>추가 월 투자</label><div class="input-wrap"><input type="number" id="mo" value="300000" step="10000"><span class="unit">원</span></div></div>
<div class="field"><label>기대 연 수익률</label><div class="input-wrap"><input type="number" id="r" value="8" min="0.1" max="50" step="0.1"><span class="unit">%</span></div></div>
<div class="field"><label>투자 기간</label><div class="input-wrap"><input type="number" id="y" value="10" min="1" max="50"><span class="unit">년</span></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">📈</div><div>정보를 입력하고 계산하세요</div></div></div></div>
<script>
function fw(n){if(n>=100000000)return(n/100000000).toFixed(1)+'억원';if(n>=10000)return Math.round(n/10000).toLocaleString()+'만원';return Math.round(n).toLocaleString()+'원'}
function calc(){
  const p=+document.getElementById('p').value,mo=+document.getElementById('mo').value,r=+document.getElementById('r').value,y=+document.getElementById('y').value;
  const mr=r/100/12,m=y*12;let bal=p;for(let i=0;i<m;i++)bal=bal*(1+mr)+mo;
  const total=Math.round(bal),invested=p+mo*m,profit=total-invested;
  document.getElementById('res').innerHTML=`<div class="card-title">투자 수익 결과</div><div class="ri hl" style="padding:22px;text-align:center;margin-bottom:14px;border:1px solid rgba(0,212,170,.3);border-radius:10px;background:rgba(0,212,170,.05)"><div class="rl">${y}년 후 총 자산</div><div class="rv" style="font-size:26px">${fw(total)}</div></div><div class="result-hero r2"><div class="ri info"><div class="rl">총 투자금</div><div class="rv">${fw(invested)}</div></div><div class="ri gold"><div class="rl">투자 수익</div><div class="rv">${fw(profit)}</div><div class="rs">수익률 ${((profit/invested)*100).toFixed(1)}%</div></div></div>`
}calc();</script><!-- ADSENSE
