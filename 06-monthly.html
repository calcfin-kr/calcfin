</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">MONTHLY SALARY</div><h1>월급 <span>계산기</span></h1><p>월급으로 연봉·시급·주휴수당을 자동으로 계산합니다</p></div>
<div class="two-col">
<div class="card anim-1"><div class="card-title">월급 정보</div>
<div class="field"><label>월급 (세전)</label><div class="input-wrap"><input type="number" id="ms" value="3000000" step="100000"><span class="unit">원</span></div><input type="range" id="msR" min="500000" max="30000000" step="100000" value="3000000"><div class="slider-labels"><span>50만</span><span>3천만</span></div></div>
<div class="field"><label>1일 근무시간</label><div class="input-wrap"><input type="number" id="dh" value="8" min="1" max="12" step="0.5"><span class="unit">시간</span></div></div>
<div class="field"><label>주 근무일수</label><div class="input-wrap"><input type="number" id="wd" value="5" min="1" max="6"><span class="unit">일</span></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">💰</div><div>월급을 입력하고 계산하세요</div></div></div>
</div>
<script>
const sy=(a,b)=>{document.getElementById(a).addEventListener('input',function(){document.getElementById(b).value=Math.min(this.value,document.getElementById(b).max)});document.getElementById(b).addEventListener('input',function(){document.getElementById(a).value=this.value})};
sy('ms','msR');
function fw(n){return Math.round(n).toLocaleString()+'원'}
function calc(){
  const ms=+document.getElementById('ms').value,dh=+document.getElementById('dh').value,wd=+document.getElementById('wd').value;
  const totalHours=dh*wd*4.345,juju=dh*4.345;
  const hw=Math.round(ms/(totalHours+juju)),yearPay=ms*12,daily=Math.round(ms/21.75);
  document.getElementById('res').innerHTML=`<div class="card-title">급여 계산 결과</div>
  <div class="result-hero r2"><div class="ri hl"><div class="rl">월급</div><div class="rv">${fw(ms)}</div></div><div class="ri gold"><div class="rl">연봉</div><div class="rv">${fw(yearPay)}</div></div><div class="ri info"><div class="rl">시급 (환산)</div><div class="rv">${hw.toLocaleString()}원</div></div><div class="ri"><div class="rl">일급 (환산)</div><div class="rv">${fw(daily)}</div></div><div class="ri"><div class="rl">주급 (환산)</div><div class="rv">${fw(Math.round(ms/4.345))}</div></div><div class="ri"><div class="rl">주휴수당(월)</div><div class="rv">${fw(Math.round(hw*juju))}</div></div></div>`
}
calc();
</script><!-- ADSENSE
