</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">CPM CALCULATOR</div><h1>CPM <span>계산기</span></h1><p>1,000회 노출당 비용(CPM)을 계산합니다</p></div>
<div class="two-col"><div class="card anim-1"><div class="card-title">CPM 정보</div>
<div class="field"><label>계산 방식</label><div class="btn-group"><button class="btn-opt active" data-m="budget2imp">예산+CPM → 노출수</button><button class="btn-opt" data-m="imp2budget">노출수+CPM → 비용</button><button class="btn-opt" data-m="calc">예산+노출 → CPM</button></div></div>
<div class="field" id="budF"><label>광고 예산</label><div class="input-wrap"><input type="number" id="budget" value="1000000" step="10000"><span class="unit">원</span></div></div>
<div class="field" id="cpmF"><label>CPM (1,000회 노출 비용)</label><div class="input-wrap"><input type="number" id="cpm" value="5000" step="100"><span class="unit">원</span></div></div>
<div class="field" id="impF" style="display:none"><label>노출 수</label><div class="input-wrap"><input type="number" id="imp" value="200000" step="1000"><span class="unit">회</span></div></div>
<div class="field"><label>예상 CTR (클릭률)</label><div class="input-wrap"><input type="number" id="ctr" value="1.5" min="0.1" max="100" step="0.1"><span class="unit">%</span></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">📢</div><div>광고 정보를 입력하고 계산하세요</div></div></div></div>
<script>
let mode='budget2imp';
document.querySelectorAll('[data-m]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-m]').forEach(x=>x.classList.remove('active'));this.classList.add('active');mode=this.dataset.m;
document.getElementById('budF').style.display=mode!=='imp2budget'?'':'none';
document.getElementById('cpmF').style.display=mode!=='calc'?'':'none';
document.getElementById('impF').style.display=mode!=='budget2imp'?'':'none'}));
function fw(n){return Math.round(n).toLocaleString()}
function calc(){
  const budget=+document.getElementById('budget').value,cpm=+document.getElementById('cpm').value,imp_in=+document.getElementById('imp').value,ctr=+document.getElementById('ctr').value/100;
  let imp,cost,actualCPM;
  if(mode==='budget2imp'){cost=budget;actualCPM=cpm;imp=Math.floor(budget/cpm*1000)}
  else if(mode==='imp2budget'){imp=imp_in;actualCPM=cpm;cost=Math.round(imp_in/1000*cpm)}
  else{imp=imp_in;cost=budget;actualCPM=(budget/imp_in*1000).toFixed(2)}
  const clicks=Math.floor(imp*ctr),cpc=clicks>0?(cost/clicks).toFixed(0):0;
  document.getElementById('res').innerHTML=`<div class="card-title">CPM 광고 분석</div><div class="result-hero r2"><div class="ri hl"><div class="rl">총 노출 수</div><div class="rv">${fw(imp)}회</div></div><div class="ri"><div class="rl">광고 비용</div><div class="rv">${fw(cost)}원</div></div><div class="ri info"><div class="rl">CPM</div><div class="rv">${actualCPM}원</div></div><div class="ri gold"><div class="rl">예상 클릭 수</div><div class="rv">${fw(clicks)}회</div></div><div class="ri"><div class="rl">환산 CPC</div><div class="rv">${cpc}원</div></div></div>`
}calc();</script><!-- ADSENSE
