<div class="two-col"><div class="card anim-1"><div class="card-title">이벤트 정보</div>
<div class="field"><label>이벤트 이름</label><div class="input-wrap"><input type="text" id="name" value="목표일" placeholder="예: 시험, 결혼, 여행" style="padding-right:14px"></div></div>
<div class="field"><label>목표 날짜</label><div class="input-wrap"><input type="date" id="target" style="padding-right:14px;font-size:14px"></div></div>
<div class="field"><label>기준일</label><div class="btn-group"><button class="btn-opt active" data-b="today">오늘</button><button class="btn-opt" data-b="custom">직접 입력</button></div></div>
<div class="field" id="baseField" style="display:none"><label>기준 날짜</label><div class="input-wrap"><input type="date" id="base" style="padding-right:14px;font-size:14px"></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">📆</div><div>목표 날짜를 입력하고 계산하세요</div></div></div></div>
<script>
let btype='today';document.querySelectorAll('[data-b]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-b]').forEach(x=>x.classList.remove('active'));this.classList.add('active');btype=this.dataset.b;document.getElementById('baseField').style.display=btype==='custom'?'':'none'}));
const now=new Date();document.getElementById('target').valueAsDate=new Date(now.getTime()+100*86400000);
function fmt(d){return d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})}
function calc(){
  const name=document.getElementById('name').value||'목표일';
  const target=new Date(document.getElementById('target').value);if(isNaN(target))return;
  const base=btype==='today'?new Date():new Date(document.getElementById('base').value);
  base.setHours(0,0,0,0);target.setHours(0,0,0,0);
  const diff=Math.floor((target-base)/86400000);
  const label=diff>0?'D-'+diff:diff===0?'D-Day':'D+'+Math.abs(diff);
  const status=diff>0?`${diff.toLocaleString()}일 남음`:diff===0?'오늘이 바로 그날!':'${Math.abs(diff)}일 지남';
  document.getElementById('res').innerHTML=`<div class="card-title">${name}</div><div class="ri hl" style="padding:28px;text-align:center;margin-bottom:14px;border:1px solid rgba(0,212,170,.3);border-radius:10px;background:rgba(0,212,170,.05)"><div class="rl">${name}</div><div class="rv" style="font-size:40px">${label}</div><div class="rs">${fmt(target)}</div></div><div class="result-hero r2"><div class="ri"><div class="rl">남은 날 (일)</div><div class="rv">${diff>0?diff.toLocaleString():'-'}일</div></div><div class="ri info"><div class="rl">남은 주</div><div class="rv">${diff>0?(diff/7).toFixed(1):'-'}주</div></div></div>`
}calc();</script><!-- ADSENSE
