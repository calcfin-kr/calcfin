<div class="two-col"><div class="card anim-1"><div class="card-title">생년월일 입력</div>
<div class="field"><label>생년월일</label><div class="input-wrap"><input type="date" id="birth" value="1990-01-01" style="padding-right:14px;font-size:14px"></div></div>
<div class="field"><label>기준일 (비워두면 오늘)</label><div class="input-wrap"><input type="date" id="base" style="padding-right:14px;font-size:14px"></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">🎂</div><div>생년월일을 입력하고 계산하세요</div></div></div></div>
<script>
function calc(){
  const birth=new Date(document.getElementById('birth').value);
  const base=document.getElementById('base').value?new Date(document.getElementById('base').value):new Date();
  if(isNaN(birth))return;
  let manAge=base.getFullYear()-birth.getFullYear();
  const m=base.getMonth()-birth.getMonth();
  if(m<0||(m===0&&base.getDate()<birth.getDate()))manAge--;
  const korAge=base.getFullYear()-birth.getFullYear()+1;
  const totalDays=Math.floor((base-birth)/86400000);
  const nextBirth=new Date(birth);nextBirth.setFullYear(base.getFullYear());
  if(nextBirth<base)nextBirth.setFullYear(base.getFullYear()+1);
  const dBirth=Math.ceil((nextBirth-base)/86400000);
  document.getElementById('res').innerHTML=`<div class="card-title">나이 계산 결과</div><div class="result-hero r2"><div class="ri hl"><div class="rl">만 나이</div><div class="rv">${manAge}세</div></div><div class="ri"><div class="rl">세는 나이 (한국식)</div><div class="rv">${korAge}세</div></div><div class="ri info"><div class="rl">태어난 지</div><div class="rv">${totalDays.toLocaleString()}일</div></div><div class="ri gold"><div class="rl">다음 생일까지</div><div class="rv">${dBirth}일</div></div></div>`
}calc();</script><!-- ADSENSE
