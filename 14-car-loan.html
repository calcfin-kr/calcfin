<div class="two-col"><div class="card anim-1"><div class="card-title">할부 정보</div>
<div class="field"><label>차량 가격</label><div class="input-wrap"><input type="number" id="price" value="30000000" step="500000"><span class="unit">원</span></div></div>
<div class="field"><label>선수금 (계약금)</label><div class="input-wrap"><input type="number" id="down" value="5000000" step="500000"><span class="unit">원</span></div></div>
<div class="field"><label>연 이자율</label><div class="input-wrap"><input type="number" id="r" value="4.9" min="0" max="20" step="0.1"><span class="unit">%</span></div></div>
<div class="field"><label>할부 기간</label><div class="btn-group"><button class="btn-opt" data-t="24">24개월</button><button class="btn-opt active" data-t="36">36개월</button><button class="btn-opt" data-t="48">48개월</button><button class="btn-opt" data-t="60">60개월</button></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">🚗</div><div>정보를 입력하고 계산하세요</div></div></div></div>
<script>
let term=36;document.querySelectorAll('[data-t]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-t]').forEach(x=>x.classList.remove('active'));this.classList.add('active');term=+this.dataset.t}));
function fw(n){return Math.round(n).toLocaleString()+'원'}
function calc(){
  const price=+document.getElementById('price').value,down=+document.getElementById('down').value,r=+document.getElementById('r').value;
  const loan=price-down,mr=r/100/12;
  const monthly=mr>0?Math.round(loan*mr*Math.pow(1+mr,term)/(Math.pow(1+mr,term)-1)):Math.round(loan/term);
  const total=monthly*term,interest=total-loan;
  document.getElementById('res').innerHTML=`<div class="card-title">할부 계산 결과</div><div class="result-hero r2"><div class="ri hl"><div class="rl">월 납입금</div><div class="rv">${fw(monthly)}</div></div><div class="ri"><div class="rl">할부 원금</div><div class="rv">${fw(loan)}</div></div><div class="ri danger"><div class="rl">총 이자</div><div class="rv">${fw(interest)}</div></div><div class="ri"><div class="rl">총 납입금액</div><div class="rv">${fw(total)}</div></div></div>`
}calc();</script><!-- ADSENSE
