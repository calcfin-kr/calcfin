</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">WATER INTAKE</div><h1>물 섭취량 <span>계산기</span></h1><p>체중과 활동량 기반 하루 권장 물 섭취량을 계산합니다</p></div>
<div class="two-col"><div class="card anim-1"><div class="card-title">신체·활동 정보</div>
<div class="field"><label>체중</label><div class="input-wrap"><input type="number" id="w" value="70" min="30" max="200" step="0.5"><span class="unit">kg</span></div><input type="range" id="wR" min="30" max="150" step="0.5" value="70"><div class="slider-labels"><span>30kg</span><span>150kg</span></div></div>
<div class="field"><label>활동 수준</label><div class="btn-group"><button class="btn-opt" data-a="0">적음</button><button class="btn-opt active" data-a="350">보통</button><button class="btn-opt" data-a="700">활발</button></div></div>
<div class="field"><label>날씨/환경</label><div class="btn-group"><button class="btn-opt active" data-e="0">보통</button><button class="btn-opt" data-e="200">더움</button><button class="btn-opt" data-e="500">매우 더움</button></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">💧</div><div>정보를 입력하고 계산하세요</div></div></div></div>
<script>
let act=350,env=0;
document.querySelectorAll('[data-a]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-a]').forEach(x=>x.classList.remove('active'));this.classList.add('active');act=+this.dataset.a}));
document.querySelectorAll('[data-e]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-e]').forEach(x=>x.classList.remove('active'));this.classList.add('active');env=+this.dataset.e}));
const sy=(a,b)=>{document.getElementById(a).addEventListener('input',function(){document.getElementById(b).value=Math.min(this.value,document.getElementById(b).max)});document.getElementById(b).addEventListener('input',function(){document.getElementById(a).value=this.value})};
sy('w','wR');
function calc(){
  const w=+document.getElementById('w').value;
  const base=Math.round(w*30)+act+env;
  const cups=Math.round(base/200),glasses=Math.round(base/250);
  document.getElementById('res').innerHTML=`<div class="card-title">물 섭취량 결과</div><div class="result-hero r2"><div class="ri hl"><div class="rl">하루 권장 섭취량</div><div class="rv">${base}ml</div><div class="rs">${(base/1000).toFixed(1)}L</div></div><div class="ri info"><div class="rl">종이컵 기준 (200ml)</div><div class="rv">${cups}잔</div></div><div class="ri gold"><div class="rl">물컵 기준 (250ml)</div><div class="rv">${glasses}잔</div></div><div class="ri"><div class="rl">체중 기준</div><div class="rv">30ml × ${w}kg</div></div></div>
  <div style="background:rgba(0,153,255,.06);border:1px solid rgba(0,153,255,.2);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--text-muted);line-height:1.8;font-family:DM Mono,monospace">💡 기상 직후 공복에 물 한 잔 · 식사 30분 전 한 잔 · 운동 전후 충분히 수분 보충</div>`
}calc();</script><!-- ADSENSE
