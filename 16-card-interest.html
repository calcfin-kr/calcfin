</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">CARD INTEREST</div><h1>카드 <span>이자 계산기</span></h1><p>신용카드 리볼빙·현금서비스 이자를 계산합니다</p></div>
<div class="two-col"><div class="card anim-1"><div class="card-title">카드 정보</div>
<div class="field"><label>카드 유형</label><div class="btn-group"><button class="btn-opt active" data-t="revolving">리볼빙</button><button class="btn-opt" data-t="cash">현금서비스</button><button class="btn-opt" data-t="installment">할부 이자</button></div></div>
<div class="field"><label>이용 금액</label><div class="input-wrap"><input type="number" id="amt" value="1000000" step="10000"><span class="unit">원</span></div></div>
<div class="field"><label>연 이자율</label><div class="input-wrap"><input type="number" id="r" value="19.9" min="0.1" max="24" step="0.1"><span class="unit">%</span></div></div>
<div class="field"><label>이용 기간</label><div class="input-wrap"><input type="number" id="t" value="12" min="1" max="60"><span class="unit">개월</span></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">💳</div><div>정보를 입력하고 계산하세요</div></div></div></div>
<script>
let ctype='revolving';document.querySelectorAll('[data-t]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-t]').forEach(x=>x.classList.remove('active'));this.classList.add('active');ctype=this.dataset.t}));
function fw(n){return Math.round(n).toLocaleString()+'원'}
function calc(){
  const amt=+document.getElementById('amt').value,r=+document.getElementById('r').value/100/12,t=+document.getElementById('t').value;
  const monthly=Math.round(amt*r*Math.pow(1+r,t)/(Math.pow(1+r,t)-1)),total=monthly*t,interest=total-amt;
  document.getElementById('res').innerHTML=`<div class="card-title">카드 이자 계산 결과</div><div class="result-hero r2"><div class="ri hl"><div class="rl">월 납입금</div><div class="rv">${fw(monthly)}</div></div><div class="ri danger"><div class="rl">총 이자</div><div class="rv">${fw(interest)}</div></div><div class="ri"><div class="rl">총 납입금액</div><div class="rv">${fw(total)}</div></div><div class="ri gold"><div class="rl">이자 부담률</div><div class="rv">${((interest/amt)*100).toFixed(1)}%</div></div></div><div style="background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.2);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--danger);line-height:1.8;font-family:DM Mono,monospace;margin-top:14px">⚠️ 카드 리볼빙·현금서비스는 고금리입니다. 가능하면 빨리 상환하세요.</div>`
}calc();</script><!-- ADSENSE
