<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4대보험 계산기 | CalcFin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css"></head><body>
<nav class="site-nav"><div class="site-nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><div class="nav-links">
<a href="index.html#loan" class="nav-link">대출</a>

<a href="index.html#salary" class="nav-link active">급여</a>
<a href="index.html#realestate" class="nav-link ">부동산</a>
<a href="index.html#investment" class="nav-link ">투자</a>
</div></div></nav>
<div class="container">
<div class="page-header"><div class="header-badge">SOCIAL INSURANCE CALCULATOR</div><h1>4대보험 <span>계산기</span></h1></div>
<div class="two-col">
<div class="card anim-1"><div class="card-title">급여 정보 입력</div>
<div class="field"><label>월 급여</label><div class="input-wrap"><input type="number" id="salary" value="3000000" step="100000"><span class="unit">원</span></div><input type="range" id="salR" min="500000" max="20000000" step="100000" value="3000000"><div class="slider-labels"><span>50만</span><span>2천만</span></div></div>
<div class="field"><label>사업 유형</label><div class="btn-group"><button class="btn-option active" data-e="1인">1인 이상 사업장</button><button class="btn-option" data-e="건설">건설업</button></div></div>
<button class="calc-btn" onclick="c14()">계산하기</button></div>
<div class="card anim-2" id="r14"><div class="card-title">보험료 계산 결과</div><div class="empty-state"><div class="empty-icon">🛡️</div><div class="empty-text">급여를 입력하고 계산하세요</div></div></div>
</div>
<script>
const ss=(a,b)=>{document.getElementById(a).addEventListener('input',function(){document.getElementById(b).value=Math.min(this.value,document.getElementById(b).max);});document.getElementById(b).addEventListener('input',function(){document.getElementById(a).value=this.value;});};
ss('salary','salR');
function fw(n){return Math.round(n).toLocaleString()+'원';}
function c14(){
  const s=parseFloat(document.getElementById('salary').value)||0;
  const npBase=Math.min(s,5900000);
  const np=Math.round(npBase*0.045);
  const hi=Math.round(s*0.03545);
  const lt=Math.round(hi*0.1295);
  const ei=Math.round(s*0.009);
  const emp=np+hi+lt+ei;
  const np2=np,hi2=hi,lt2=lt,ei2=Math.round(s*0.013),acc=Math.round(s*0.009);
  const erm=np2+hi2+lt2+ei2+acc;
  document.getElementById('r14').innerHTML=`<div class="card-title">보험료 계산 결과</div>
  <div class="section-title">근로자 부담</div>
  <div class="result-hero result-grid-2" style="margin-bottom:16px">
    <div class="result-item"><div class="result-label">국민연금 (4.5%)</div><div class="result-value" style="font-size:15px">${fw(np)}</div></div>
    <div class="result-item"><div class="result-label">건강보험 (3.545%)</div><div class="result-value" style="font-size:15px">${fw(hi)}</div></div>
    <div class="result-item"><div class="result-label">장기요양 (0.46%)</div><div class="result-value" style="font-size:15px">${fw(lt)}</div></div>
    <div class="result-item"><div class="result-label">고용보험 (0.9%)</div><div class="result-value" style="font-size:15px">${fw(ei)}</div></div>
    <div class="result-item highlight" style="grid-column:1/-1"><div class="result-label">근로자 합계</div><div class="result-value">${fw(emp)}</div></div>
  </div>
  <div class="section-title">사업주 부담</div>
  <div class="result-item info" style="text-align:center;padding:16px;border:1px solid rgba(0,153,255,0.3);border-radius:10px;background:rgba(0,153,255,0.05)">
    <div class="result-label">사업주 합계 (산재보험 포함)</div>
    <div class="result-value">${fw(erm)}</div>
  </div>`;}
c14();
</script>
