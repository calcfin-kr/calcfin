</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">COMPOUND INTEREST</div><h1>복리 <span>계산기</span></h1><p>초기 투자금과 월 적립액으로 복리 수익을 계산합니다</p></div>
<div class="two-col">
<div class="card anim-1"><div class="card-title">투자 정보</div>
<div class="field"><label>초기 투자금</label><div class="input-wrap"><input type="number" id="init" value="10000000" step="1000000"><span class="unit">원</span></div></div>
<div class="field"><label>월 적립액</label><div class="input-wrap"><input type="number" id="monthly" value="500000" step="10000"><span class="unit">원</span></div></div>
<div class="field"><label>연 수익률</label><div class="input-wrap"><input type="number" id="rate" value="7" min="0.1" max="30" step="0.1"><span class="unit">%</span></div><input type="range" id="rateR" min="1" max="20" step="0.1" value="7"><div class="slider-labels"><span>1%</span><span>20%</span></div></div>
<div class="field"><label>투자 기간</label><div class="input-wrap"><input type="number" id="yrs" value="20" min="1" max="50"><span class="unit">년</span></div><input type="range" id="yrsR" min="1" max="50" step="1" value="20"><div class="slider-labels"><span>1년</span><span>50년</span></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">🌱</div><div>정보를 입력하고 계산하세요</div></div></div>
</div>
<script>
const sy=(a,b)=>{document.getElementById(a).addEventListener('input',function(){document.getElementById(b).value=Math.min(this.value,document.getElementById(b).max)});document.getElementById(b).addEventListener('input',function(){document.getElementById(a).value=this.value})};
sy('rate','rateR');sy('yrs','yrsR');
function fw(n){if(n>=100000000)return(n/100000000).toFixed(1)+'억원';if(n>=10000)return Math.round(n/10000).toLocaleString()+'만원';return Math.round(n).toLocaleString()+'원'}
function calc(){
  const init=+document.getElementById('init').value,mo=+document.getElementById('monthly').value,r=+document.getElementById('rate').value,y=+document.getElementById('yrs').value;
  const mr=r/100/12,months=y*12;
  let bal=init;
  for(let i=0;i<months;i++) bal=bal*(1+mr)+mo;
  const total=Math.round(bal),invested=init+mo*months,profit=total-invested;
  const roi=((profit/invested)*100).toFixed(1);
  document.getElementById('res').innerHTML=`<div class="card-title">복리 수익 결과</div>
  <div class="ri hl" style="padding:24px;text-align:center;margin-bottom:14px;border:1px solid rgba(0,212,170,.3);border-radius:10px;background:rgba(0,212,170,.05)"><div class="rl">${y}년 후 총 자산</div><div class="rv" style="font-size:28px">${fw(total)}</div></div>
  <div class="result-hero r2"><div class="ri info"><div class="rl">총 투자원금</div><div class="rv">${fw(invested)}</div></div><div class="ri gold"><div class="rl">복리 수익</div><div class="rv">${fw(profit)}</div><div class="rs">수익률 ${roi}%</div></div></div>
  <div class="prog-wrap"><div class="prog-labels"><span>원금 ${(100-+roi>0?(100-+roi).toFixed(1):0)}%</span><span>수익 ${roi}%</span></div><div class="prog-track"><div class="prog-fill" id="pf" style="background:linear-gradient(90deg,var(--accent),var(--gold))"></div></div></div>`;
  setTimeout(()=>{document.getElementById('pf').style.width=Math.min(+roi,100)+'%'},100)
}
calc();
</script><!-- ADSENSE
