<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>부가세 계산기 | CalcFin</title><meta name="description" content="공급가액과 부가가치세를 양방향으로 계산하세요."><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"><link rel="stylesheet" href="common.css"></head>
<body>
<nav class="site-nav"><div class="site-nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><div class="nav-links"><a href="index.html#loan" class="nav-link">대출</a><a href="index.html#tax" class="nav-link active">세금</a><a href="index.html#salary" class="nav-link">급여</a><a href="index.html#realestate" class="nav-link">부동산</a><a href="index.html#investment" class="nav-link">투자</a></div></div></nav>
<div class="container">
<div class="page-header"><div class="header-badge">VAT CALCULATOR</div><h1>부가세 <span>계산기</span></h1><p>공급가액 → 부가세 포함가 · 부가세 포함가 → 공급가액 양방향 계산</p></div>
<div class="two-col">
  <div class="card anim-1">
    <div class="card-title">계산 방향 선택</div>
    <div class="field"><label>계산 방식</label>
      <div class="btn-group">
        <button class="btn-option active" data-m="add">공급가 → 부가세 추가</button>
        <button class="btn-option" data-m="remove">총액 → 공급가 분리</button>
      </div>
    </div>
    <div class="field"><label id="amtLabel">공급가액 (VAT 제외)</label><div class="input-wrap"><input type="number" id="amt" value="1000000" step="10000"><span class="unit">원</span></div></div>
    <div class="field"><label>부가세율</label>
      <div class="btn-group">
        <button class="btn-option active" data-vr="10">10% (일반)</button>
        <button class="btn-option" data-vr="0">0% (영세율)</button>
      </div>
    </div>
    <button class="calc-btn" onclick="calc()">계산하기</button>
  </div>
  <div class="card anim-2" id="result">
    <div class="card-title">계산 결과</div>
    <div class="empty-state"><div class="empty-icon">🧮</div><div class="empty-text">금액을 입력하고 계산하세요</div></div>
  </div>
</div>
<div class="ad-banner">📢 GOOGLE ADSENSE 광고 영역 (728×90)</div>
<div class="related-grid">
  <a href="06-income-tax.html" class="related-link">📋 종합소득세 계산기<span class="arrow">→</span></a>
  <a href="08-acquisition-tax.html" class="related-link">🏛️ 취득세 계산기<span class="arrow">→</span></a>
  <a href="09-capital-gains.html" class="related-link">📈 양도소득세 계산기<span class="arrow">→</span></a>
</div>
<div class="site-footer">© 2025 CalcFin · 참고용 계산기입니다</div>
</div>
<script>
let mode='add', vatRate=10;
document.querySelectorAll('[data-m]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-m]').forEach(x=>x.classList.remove('active'));this.classList.add('active');mode=this.dataset.m;document.getElementById('amtLabel').textContent=mode==='add'?'공급가액 (VAT 제외)':'VAT 포함 총액';}));
document.querySelectorAll('[data-vr]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-vr]').forEach(x=>x.classList.remove('active'));this.classList.add('active');vatRate=parseInt(this.dataset.vr);}));
function fw(n){return Math.round(n).toLocaleString()+'원';}
function calc(){
  const amt=parseFloat(document.getElementById('amt').value)||0;
  let supply,vat,total;
  if(mode==='add'){supply=amt;vat=Math.round(amt*vatRate/100);total=supply+vat;}
  else{total=amt;supply=Math.round(amt/(1+vatRate/100));vat=total-supply;}
  document.getElementById('result').innerHTML=`
  <div class="card-title">계산 결과</div>
  <div class="result-hero result-grid-2">
    <div class="result-item info"><div class="result-label">공급가액 (VAT 제외)</div><div class="result-value">${fw(supply)}</div></div>
    <div class="result-item gold"><div class="result-label">부가가치세 (${vatRate}%)</div><div class="result-value">${fw(vat)}</div></div>
    <div class="result-item highlight" style="grid-column:1/-1"><div class="result-label">합계 (VAT 포함)</div><div class="result-value" style="font-size:26px">${fw(total)}</div></div>
  </div>
  <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:12px;color:var(--text-muted);line-height:1.8;font-family:'DM Mono',monospace;">
    💡 사업자 세금계산서 발행 시 공급가액과 세액을 구분하여 기재합니다<br>
    부가세 신고: 1기 1월~6월 / 2기 7월~12월
  </div>`;
}
calc();
</script>
</body></html>
