<title>임대수익률 계산기 | CalcFin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css"></head><body>
<nav class="site-nav"><div class="site-nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><div class="nav-links">
<a href="index.html#loan" class="nav-link">대출</a>

</div></div></nav>
<div class="container">
<div class="page-header"><div class="header-badge">RENTAL ROI CALCULATOR</div><h1>임대수익률 <span>계산기</span></h1></div>
<div class="two-col">
<div class="card anim-1"><div class="card-title">임대 정보 입력</div>
<div class="field"><label>매매가격</label><div class="input-wrap"><input type="number" id="price" value="500000000" step="10000000"><span class="unit">원</span></div></div>
<div class="field"><label>전세 보증금 (또는 전세 환산금)</label><div class="input-wrap"><input type="number" id="deposit" value="300000000" step="10000000"><span class="unit">원</span></div></div>
<div class="field"><label>월세</label><div class="input-wrap"><input type="number" id="rent" value="500000" step="10000"><span class="unit">원</span></div></div>
<div class="field"><label>연간 관리비·수선비</label><div class="input-wrap"><input type="number" id="cost" value="1000000" step="100000"><span class="unit">원</span></div></div>
<div class="field"><label>예상 공실률</label><div class="input-wrap"><input type="number" id="vacancy" value="5" min="0" max="50"><span class="unit">%</span></div></div>
<button class="calc-btn" onclick="c16()">계산하기</button></div>
<div class="card anim-2" id="r16"><div class="card-title">수익률 분석</div><div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">임대 정보를 입력하고 계산하세요</div></div></div>
</div>
<script>
function c16(){
  const p=parseFloat(document.getElementById('price').value)||0;
  const d=parseFloat(document.getElementById('deposit').value)||0;
  const r=parseFloat(document.getElementById('rent').value)||0;
  const c=parseFloat(document.getElementById('cost').value)||0;
  const v=parseFloat(document.getElementById('vacancy').value)||0;
  const invest=p-d;
  const grossRent=r*12*(1-v/100);
  const netRent=grossRent-c;
  const grossROI=(invest>0?(grossRent/invest*100):0).toFixed(2);
  const netROI=(invest>0?(netRent/invest*100):0).toFixed(2);
  document.getElementById('r16').innerHTML=`<div class="card-title">수익률 분석</div>
  <div class="result-hero result-grid-2">
    <div class="result-item info"><div class="result-label">실투자금</div><div class="result-value">${(invest/100000000).toFixed(1)}억원</div><div class="result-sub">매매가 - 보증금</div></div>
    <div class="result-item"><div class="result-label">연 임대수입</div><div class="result-value">${Math.round(grossRent/10000).toLocaleString()}만원</div></div>
    <div class="result-item highlight"><div class="result-label">총 수익률 (연)</div><div class="result-value">${grossROI}%</div></div>
    <div class="result-item ${parseFloat(netROI)>=3?'info':'danger'}"><div class="result-label">순 수익률 (연)</div><div class="result-value">${netROI}%</div><div class="result-sub">관리비·공실 반영</div></div>
  </div>
  <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:12px;color:var(--text-muted);line-height:1.8;font-family:'DM Mono',monospace;">
    💡 순수익률 3% 이상 권장 · 대출이자·세금 별도 고려 필요
  </div>`;}
c16();
</script>
