</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">SAVINGS CALCULATOR</div><h1>적금 <span>계산기</span></h1><p>월 적립액 기준 만기 수령액과 세후 이자를 계산합니다</p></div>
<div class="two-col"><div class="card anim-1"><div class="card-title">적금 정보</div>
<div class="field"><label>월 적립액</label><div class="input-wrap"><input type="number" id="mo" value="500000" step="10000"><span class="unit">원</span></div></div>
<div class="field"><label>연 이자율</label><div class="input-wrap"><input type="number" id="r" value="3.5" min="0.1" max="20" step="0.1"><span class="unit">%</span></div></div>
<div class="field"><label>만기 기간</label><div class="input-wrap"><input type="number" id="t" value="12" min="1" max="60"><span class="unit">개월</span></div></div>
<div class="field"><label>이자 방식</label><div class="btn-group"><button class="btn-opt active" data-i="simple">단리</button><button class="btn-opt" data-i="compound">복리(월)</button></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">🏦</div><div>정보를 입력하고 계산하세요</div></div></div></div>
<script>
let itype='simple';document.querySelectorAll('[data-i]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-i]').forEach(x=>x.classList.remove('active'));this.classList.add('active');itype=this.dataset.i}));
function fw(n){return Math.round(n).toLocaleString()+'원'}
function calc(){
  const mo=+document.getElementById('mo').value,r=+document.getElementById('r').value,t=+document.getElementById('t').value;
  let principal=mo*t,interest;
  if(itype==='simple')interest=Math.round(mo*(t*(t+1)/2)*(r/100/12));
  else{let bal=0;for(let i=0;i<t;i++)bal=(bal+mo)*(1+r/100/12);interest=Math.round(bal-principal)}
  const gross=principal+interest,tax=Math.round(interest*0.154),net=gross-tax;
  document.getElementById('res').innerHTML=`<div class="card-title">적금 계산 결과</div><div class="result-hero r2"><div class="ri info"><div class="rl">납입 원금</div><div class="rv">${fw(principal)}</div></div><div class="ri gold"><div class="rl">세전 이자</div><div class="rv">${fw(interest)}</div></div><div class="ri danger"><div class="rl">이자소득세 (15.4%)</div><div class="rv">-${fw(tax)}</div></div><div class="ri hl"><div class="rl">세후 수령액</div><div class="rv">${fw(net)}</div></div></div>`
}calc();</script><!-- ADSENSE
