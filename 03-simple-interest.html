</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">SIMPLE INTEREST</div><h1>단리 <span>계산기</span></h1><p>원금·이자율·기간으로 단리 이자와 만기 수령액을 계산합니다</p></div>
<div class="two-col">
<div class="card anim-1"><div class="card-title">정보 입력</div>
<div class="field"><label>원금</label><div class="input-wrap"><input type="number" id="p" value="10000000" step="100000"><span class="unit">원</span></div></div>
<div class="field"><label>연 이자율</label><div class="input-wrap"><input type="number" id="r" value="4.5" min="0.1" max="30" step="0.1"><span class="unit">%</span></div></div>
<div class="field"><label>기간 단위</label><div class="btn-group"><button class="btn-opt active" data-u="year">년</button><button class="btn-opt" data-u="month">개월</button><button class="btn-opt" data-u="day">일</button></div></div>
<div class="field"><label>기간</label><div class="input-wrap"><input type="number" id="t" value="2" min="1"><span class="unit" id="tUnit">년</span></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">📐</div><div>정보를 입력하고 계산하세요</div></div></div>
</div>
<script>
let unit='year';
document.querySelectorAll('.btn-opt').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.btn-opt').forEach(x=>x.classList.remove('active'));this.classList.add('active');unit=this.dataset.u;document.getElementById('tUnit').textContent={year:'년',month:'개월',day:'일'}[unit]}));
function fw(n){return Math.round(n).toLocaleString()+'원'}
function calc(){
  const p=+document.getElementById('p').value,r=+document.getElementById('r').value/100,t=+document.getElementById('t').value;
  const yrs=unit==='year'?t:unit==='month'?t/12:t/365;
  const interest=Math.round(p*r*yrs),total=p+interest;
  document.getElementById('res').innerHTML=`<div class="card-title">단리 계산 결과</div>
  <div class="result-hero r2"><div class="ri hl"><div class="rl">이자</div><div class="rv">${fw(interest)}</div></div><div class="ri"><div class="rl">만기 수령액</div><div class="rv">${fw(total)}</div></div><div class="ri info"><div class="rl">원금</div><div class="rv">${fw(p)}</div></div><div class="ri gold"><div class="rl">실효 이자율</div><div class="rv">${(r*yrs*100).toFixed(2)}%</div></div></div>`
}
calc();
</script><!-- ADSENSE
