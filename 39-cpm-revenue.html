</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">CPM REVENUE</div><h1>CPM 수익 <span>계산기</span></h1><p>블로그·사이트 CPM 기반 광고 수익을 계산합니다</p></div>
<div class="two-col"><div class="card anim-1"><div class="card-title">사이트 정보</div>
<div class="field"><label>일 방문자 수 (UV)</label><div class="input-wrap"><input type="number" id="uv" value="1000" step="100"><span class="unit">명/일</span></div></div>
<div class="field"><label>페이지뷰 / 방문자</label><div class="input-wrap"><input type="number" id="pv" value="2.5" min="1" max="20" step="0.1"><span class="unit">페이지</span></div></div>
<div class="field"><label>CPM (1,000 페이지뷰당 수익)</label><div class="input-wrap"><input type="number" id="cpm" value="2000" step="100"><span class="unit">원</span></div></div>
<div class="field"><label>광고 단가 수준</label><div class="btn-group"><button class="btn-opt" data-c="500">저단가 500원</button><button class="btn-opt active" data-c="2000">중간 2,000원</button><button class="btn-opt" data-c="5000">고단가 5,000원</button></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">💸</div><div>사이트 정보를 입력하고 계산하세요</div></div></div></div>
<script>
document.querySelectorAll('[data-c]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-c]').forEach(x=>x.classList.remove('active'));this.classList.add('active');document.getElementById('cpm').value=this.dataset.c}));
function fw(n){return Math.round(n).toLocaleString()+'원'}
function calc(){
  const uv=+document.getElementById('uv').value,pv=+document.getElementById('pv').value,cpm=+document.getElementById('cpm').value;
  const dailyPV=uv*pv,dailyRev=dailyPV/1000*cpm,monthRev=dailyRev*30,yearRev=monthRev*12;
  document.getElementById('res').innerHTML=`<div class="card-title">CPM 수익 예측</div><div class="result-hero r2"><div class="ri"><div class="rl">일 페이지뷰</div><div class="rv">${fw(dailyPV).replace('원','')}회</div></div><div class="ri hl"><div class="rl">일 수익</div><div class="rv">${fw(Math.round(dailyRev))}</div></div><div class="ri gold"><div class="rl">월 수익</div><div class="rv">${fw(Math.round(monthRev))}</div></div><div class="ri info"><div class="rl">연 수익</div><div class="rv">${fw(Math.round(yearRev))}</div></div></div>
  <div style="background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.2);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--text-muted);line-height:1.8;font-family:DM Mono,monospace">💡 일 방문자 10만명 · CPM 5,000원 기준 → 월 약 1,500만원<br>금융/법률/보험 키워드 CPM 최대 20,000원</div>`
}calc();</script><!-- ADSENSE
