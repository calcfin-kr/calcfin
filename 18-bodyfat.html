</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">BODY FAT</div><h1>체지방 <span>계산기</span></h1><p>체지방률·체지방량·제지방량을 계산합니다</p></div>
<div class="two-col"><div class="card anim-1"><div class="card-title">신체 정보</div>
<div class="field"><label>성별</label><div class="btn-group"><button class="btn-opt active" data-g="m">남성</button><button class="btn-opt" data-g="f">여성</button></div></div>
<div class="field"><label>나이</label><div class="input-wrap"><input type="number" id="age" value="30" min="10" max="90"><span class="unit">세</span></div></div>
<div class="field"><label>키</label><div class="input-wrap"><input type="number" id="h" value="175" min="140" max="220" step="0.1"><span class="unit">cm</span></div></div>
<div class="field"><label>몸무게</label><div class="input-wrap"><input type="number" id="w" value="70" min="30" max="200" step="0.1"><span class="unit">kg</span></div></div>
<div class="field"><label>허리 둘레</label><div class="input-wrap"><input type="number" id="waist" value="80" min="50" max="150" step="0.5"><span class="unit">cm</span></div></div>
<div class="field"><label>목 둘레</label><div class="input-wrap"><input type="number" id="neck" value="37" min="25" max="60" step="0.5"><span class="unit">cm</span></div></div>
<div class="field" id="hipField" style="display:none"><label>엉덩이 둘레</label><div class="input-wrap"><input type="number" id="hip" value="90" min="60" max="160" step="0.5"><span class="unit">cm</span></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">💪</div><div>신체 정보를 입력하고 계산하세요</div></div></div></div>
<script>
let gender='m';document.querySelectorAll('[data-g]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-g]').forEach(x=>x.classList.remove('active'));this.classList.add('active');gender=this.dataset.g;document.getElementById('hipField').style.display=gender==='f'?'':'none'}));
function calc(){
  const h=+document.getElementById('h').value,w=+document.getElementById('w').value,waist=+document.getElementById('waist').value,neck=+document.getElementById('neck').value;
  let bf;
  if(gender==='m')bf=495/(1.0324-0.19077*Math.log10(waist-neck)+0.15456*Math.log10(h))-450;
  else{const hip=+document.getElementById('hip').value;bf=495/(1.29579-0.35004*Math.log10(waist+hip-neck)+0.22100*Math.log10(h))-450}
  bf=Math.max(3,Math.min(60,bf));
  const fatMass=w*bf/100,leanMass=w-fatMass;
  const std=gender==='m'?{low:6,normal:15,high:25}:{low:14,normal:22,high:32};
  const status=bf<std.low?'매우 낮음':bf<std.normal?'정상':bf<std.high?'약간 높음':'비만';
  document.getElementById('res').innerHTML=`<div class="card-title">체지방 분석 결과</div><div class="result-hero r2"><div class="ri ${bf>std.high?'danger':bf<std.low?'info':'hl'}"><div class="rl">체지방률</div><div class="rv">${bf.toFixed(1)}%</div><div class="rs">${status}</div></div><div class="ri"><div class="rl">체지방량</div><div class="rv">${fatMass.toFixed(1)}kg</div></div><div class="ri gold"><div class="rl">근육량(제지방)</div><div class="rv">${leanMass.toFixed(1)}kg</div></div><div class="ri info"><div class="rl">정상 범위</div><div class="rv">${std.low}~${std.normal}%</div></div></div>`
}calc();</script><!-- ADSENSE
