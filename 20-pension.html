<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노후 연금 계산기 | CalcFin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css"></head><body>
<nav class="site-nav"><div class="site-nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><div class="nav-links">
<a href="index.html#loan" class="nav-link">대출</a>
<a href="index.html#tax" class="nav-link">세금</a>
<a href="index.html#salary" class="nav-link ">급여</a>
<a href="index.html#realestate" class="nav-link ">부동산</a>
<a href="index.html#investment" class="nav-link active">투자</a>
</div></div></nav>
<div class="container">
<div class="page-header"><div class="header-badge">PENSION CALCULATOR</div><h1>노후 연금 <span>계산기</span></h1></div>
<div class="two-col">
<div class="card anim-1"><div class="card-title">노후 계획 정보</div>
<div class="field"><label>현재 나이</label><div class="input-wrap"><input type="number" id="age" value="35" min="20" max="65"><span class="unit">세</span></div></div>
<div class="field"><label>은퇴 예정 나이</label><div class="input-wrap"><input type="number" id="retire" value="60" min="40" max="75"><span class="unit">세</span></div></div>
<div class="field"><label>기대 수명</label><div class="input-wrap"><input type="number" id="life" value="85" min="65" max="100"><span class="unit">세</span></div></div>
<div class="field"><label>월 목표 생활비 (은퇴 후)</label><div class="input-wrap"><input type="number" id="need" value="3000000" step="100000"><span class="unit">원</span></div></div>
<div class="field"><label>예상 국민연금 월 수령액</label><div class="input-wrap"><input type="number" id="nps" value="1000000" step="10000"><span class="unit">원</span></div></div>
<div class="field"><label>현재 보유 자산 (저축·투자)</label><div class="input-wrap"><input type="number" id="curr" value="50000000" step="1000000"><span class="unit">원</span></div></div>
<div class="field"><label>예상 연 수익률</label><div class="input-wrap"><input type="number" id="ret" value="5" min="1" max="15" step="0.1"><span class="unit">%</span></div></div>
<button class="calc-btn" onclick="c20()">계산하기</button></div>
<div class="card anim-2" id="r20"><div class="card-title">노후 준비 분석</div><div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-text">정보를 입력하고 은퇴 계획을 수립하세요</div></div></div>
</div>
<script>
function fw(n){if(n>=100000000)return(n/100000000).toFixed(1)+'억원';if(n>=10000)return Math.round(n/10000).toLocaleString()+'만원';return n.toLocaleString()+'원';}
function c20(){
  const age=parseInt(document.getElementById('age').value)||0;
  const retire=parseInt(document.getElementById('retire').value)||0;
  const life=parseInt(document.getElementById('life').value)||0;
  const need=parseFloat(document.getElementById('need').value)||0;
  const nps=parseFloat(document.getElementById('nps').value)||0;
  const curr=parseFloat(document.getElementById('curr').value)||0;
  const ret=parseFloat(document.getElementById('ret').value)||0;
  const saveYears=retire-age;
  const retireYears=life-retire;
  const shortfall=Math.max(0,need-nps);
  const needed=shortfall*12*retireYears;
  const mr=ret/100/12, sm=saveYears*12;
  const futureAsset=Math.round(curr*Math.pow(1+ret/100,saveYears));
  const gap=Math.max(0,needed-futureAsset);
  const monthSave=gap>0?Math.round(gap*mr/(Math.pow(1+mr,sm)-1)):0;
  document.getElementById('r20').innerHTML=`<div class="card-title">노후 준비 분석</div>
  <div class="result-hero result-grid-2">
    <div class="result-item info"><div class="result-label">은퇴까지 기간</div><div class="result-value">${saveYears}년</div></div>
    <div class="result-item"><div class="result-label">은퇴 후 기간</div><div class="result-value">${retireYears}년</div></div>
    <div class="result-item danger"><div class="result-label">필요 노후 자금</div><div class="result-value">${fw(needed)}</div><div class="result-sub">월 부족분 ${fw(shortfall)} × ${retireYears*12}개월</div></div>
    <div class="result-item gold"><div class="result-label">현 자산 미래가치</div><div class="result-value">${fw(futureAsset)}</div></div>
    <div class="result-item ${gap>0?'danger':'highlight'}" style="grid-column:1/-1"><div class="result-label">${gap>0?'추가 필요 자금':'목표 달성!'}</div><div class="result-value" style="font-size:24px">${gap>0?fw(gap):'✅ '+fw(futureAsset-needed)+' 여유'}</div></div>
  </div>
  ${gap>0?`<div style="background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.2);border-radius:10px;padding:18px;text-align:center;font-family:'DM Mono',monospace;">
    <div style="color:var(--text-muted);font-size:11px;letter-spacing:2px;margin-bottom:8px">매달 추가 저축 필요액</div>
    <div style="font-size:28px;color:var(--accent)">${monthSave.toLocaleString()}원</div>
    <div style="color:var(--text-muted);font-size:11px;margin-top:4px">연 수익률 ${ret}% 가정</div>
  </div>`:''}`;
}
c20();
</script>
