</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">WATER BILL</div><h1>수도요금 <span>계산기</span></h1><p>수도 사용량 기반 요금을 계산합니다</p></div>
<div class="two-col"><div class="card anim-1"><div class="card-title">사용량 정보</div>
<div class="field"><label>월 사용량</label><div class="input-wrap"><input type="number" id="ton" value="20" min="0" max="500"><span class="unit">톤(㎥)</span></div><input type="range" id="tonR" min="0" max="100" step="1" value="20"><div class="slider-labels"><span>0</span><span>100톤</span></div></div>
<div class="field"><label>가구 구분</label><div class="btn-group"><button class="btn-opt active" data-t="home">가정용</button><button class="btn-opt" data-t="biz">일반(상업)</button></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">🚰</div><div>사용량을 입력하고 계산하세요</div></div></div></div>
<script>
let ttype='home';
document.querySelectorAll('[data-t]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-t]').forEach(x=>x.classList.remove('active'));this.classList.add('active');ttype=this.dataset.t}));
const sy=(a,b)=>{document.getElementById(a).addEventListener('input',function(){document.getElementById(b).value=Math.min(this.value,document.getElementById(b).max)});document.getElementById(b).addEventListener('input',function(){document.getElementById(a).value=this.value})};sy('ton','tonR');
function fw(n){return Math.round(n).toLocaleString()+'원'}
function calc(){
  const ton=+document.getElementById('ton').value;
  let water=0;
  if(ton<=10)water=ton*380;else if(ton<=20)water=10*380+(ton-10)*550;else if(ton<=30)water=10*380+10*550+(ton-20)*730;else water=10*380+10*550+10*730+(ton-30)*880;
  const sewage=Math.round(water*0.8),base=750,sub=base+water+sewage;
  const vat=ttype==='biz'?Math.round(sub*0.1):0,total=sub+vat;
  document.getElementById('res').innerHTML=`<div class="card-title">수도요금 계산 결과</div><div class="result-hero r2"><div class="ri hl"><div class="rl">예상 청구액</div><div class="rv">${fw(total)}</div></div><div class="ri"><div class="rl">상수도 요금</div><div class="rv">${fw(Math.round(water))}</div></div><div class="ri info"><div class="rl">하수도 요금</div><div class="rv">${fw(sewage)}</div></div><div class="ri"><div class="rl">기본요금</div><div class="rv">${fw(base)}</div></div></div>
  <div style="font-size:11px;color:var(--text-muted);font-family:DM Mono,monospace;margin-top:10px">※ 서울시 기준 추정치 · 지자체별 요금 상이</div>`
}calc();</script><!-- ADSENSE
