</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">SALARY 2026</div><h1>연봉 <span>실수령액</span> 계산기</h1><p>2026년 기준 4대보험·소득세 공제 후 월 실수령액을 계산합니다</p></div>
<div class="two-col">
<div class="card anim-1"><div class="card-title">급여 정보</div>
<div class="field"><label>연봉</label><div class="input-wrap"><input type="number" id="ann" value="40000000" step="1000000"><span class="unit">원</span></div><input type="range" id="annR" min="10000000" max="300000000" step="1000000" value="40000000"><div class="slider-labels"><span>1천만</span><span>3억</span></div></div>
<div class="field"><label>부양가족 수 (본인 포함)</label><div class="input-wrap"><select id="dep"><option value="1">1명(본인만)</option><option value="2">2명</option><option value="3">3명</option><option value="4">4명</option><option value="5">5명+</option></select></div></div>
<div class="field"><label>20세 이하 자녀 수</label><div class="input-wrap"><input type="number" id="child" value="0" min="0" max="10"><span class="unit">명</span></div></div>
<div class="field"><label>비과세 소득(월, 식대 등)</label><div class="input-wrap"><input type="number" id="nt" value="200000" step="10000"><span class="unit">원</span></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">💴</div><div>연봉을 입력하고 계산하세요</div></div></div>
</div>
<script>
const sy=(a,b)=>{document.getElementById(a).addEventListener('input',function(){document.getElementById(b).value=Math.min(this.value,document.getElementById(b).max)});document.getElementById(b).addEventListener('input',function(){document.getElementById(a).value=this.value})};
sy('ann','annR');
function fw(n){return Math.round(n).toLocaleString()+'원'}
function calc(){
  const ann=+document.getElementById('ann').value,dep=+document.getElementById('dep').value,child=+document.getElementById('child').value,nt=+document.getElementById('nt').value;
  const ms=ann/12,mt=Math.max(0,ms-nt);
  const np=Math.round(Math.min(ms,5900000)*0.045);
  const hi=Math.round(mt*0.03545),lt=Math.round(hi*0.1295),ei=Math.round(mt*0.009);
  let std=0;
  if(ann<=5000000)std=ann*0.7;else if(ann<=15000000)std=3500000+(ann-5000000)*0.4;else if(ann<=45000000)std=7500000+(ann-15000000)*0.15;else if(ann<=100000000)std=12000000+(ann-45000000)*0.05;else std=14750000;
  let tb=Math.max(0,ann-std-1500000*dep-1500000*child);
  let tax=0;if(tb<=14000000)tax=tb*0.06;else if(tb<=50000000)tax=840000+(tb-14000000)*0.15;else if(tb<=88000000)tax=6240000+(tb-50000000)*0.24;else tax=15360000+(tb-88000000)*0.35;
  const it=Math.max(0,Math.round(tax/12)),lt2=Math.round(it*0.1);
  const total=np+hi+lt+ei+it+lt2,net=Math.round(ms-total);
  document.getElementById('res').innerHTML=`<div class="card-title">실수령액</div>
  <div class="ri hl" style="padding:22px;text-align:center;margin-bottom:14px;border:1px solid rgba(0,212,170,.3);border-radius:10px;background:rgba(0,212,170,.05)"><div class="rl">월 실수령액</div><div class="rv" style="font-size:26px">${fw(net)}</div><div class="rs">연 ${Math.round(net*12/10000).toLocaleString()}만원</div></div>
  <div class="result-hero r2" style="margin-bottom:12px"><div class="ri"><div class="rl">국민연금</div><div class="rv" style="font-size:14px">-${fw(np)}</div></div><div class="ri"><div class="rl">건강보험</div><div class="rv" style="font-size:14px">-${fw(hi)}</div></div><div class="ri"><div class="rl">장기요양</div><div class="rv" style="font-size:14px">-${fw(lt)}</div></div><div class="ri"><div class="rl">고용보험</div><div class="rv" style="font-size:14px">-${fw(ei)}</div></div><div class="ri"><div class="rl">소득세</div><div class="rv" style="font-size:14px">-${fw(it)}</div></div><div class="ri danger"><div class="rl">총 공제</div><div class="rv" style="font-size:14px">-${fw(total)}</div></div></div>`
}
calc();
</script><!-- ADSENSE
