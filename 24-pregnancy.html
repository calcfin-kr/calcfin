<div class="two-col"><div class="card anim-1"><div class="card-title">임신 정보</div>
<div class="field"><label>마지막 생리 시작일 (LMP)</label><div class="input-wrap"><input type="date" id="lmp" style="padding-right:14px;font-size:14px"></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">🤰</div><div>마지막 생리 시작일을 입력하고 계산하세요</div></div></div></div>
<script>
document.getElementById('lmp').valueAsDate=new Date(Date.now()-70*86400000);
function fmt(d){return d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})}
function calc(){
  const lmp=new Date(document.getElementById('lmp').value);if(isNaN(lmp))return;
  const now=new Date(),totalDays=Math.floor((now-lmp)/86400000),weeks=Math.floor(totalDays/7),days=totalDays%7;
  const due=new Date(lmp.getTime()+280*86400000),ddays=Math.round((due-now)/86400000);
  const months=Math.floor(totalDays/30.5);
  const stage=weeks<14?'초기':weeks<28?'중기':'말기';
  document.getElementById('res').innerHTML=`<div class="card-title">임신 주수 결과</div><div class="result-hero r2"><div class="ri hl"><div class="rl">현재 임신 주수</div><div class="rv">${weeks}주 ${days}일</div></div><div class="ri"><div class="rl">임신 개월수</div><div class="rv">${months}개월</div></div><div class="ri info"><div class="rl">출산 예정일</div><div class="rv" style="font-size:14px">${fmt(due)}</div></div><div class="ri gold"><div class="rl">D-Day</div><div class="rv">${ddays>0?'D-'+ddays:'출산 완료'}</div></div><div class="ri"><div class="rl">임신 시기</div><div class="rv">${stage}</div></div></div>`
}calc();</script><!-- ADSENSE
