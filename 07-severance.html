</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">SEVERANCE PAY</div><h1>퇴직금 <span>계산기</span></h1><p>근속 기간과 평균 임금으로 법정 퇴직금을 계산합니다</p></div>
<div class="two-col">
<div class="card anim-1"><div class="card-title">근무 정보</div>
<div class="field"><label>입사일</label><div class="input-wrap"><input type="date" id="st" value="2020-01-01" style="padding-right:14px;font-size:14px"></div></div>
<div class="field"><label>퇴사일</label><div class="input-wrap"><input type="date" id="en" value="2026-04-18" style="padding-right:14px;font-size:14px"></div></div>
<div class="field"><label>최근 3개월 평균 월 임금</label><div class="input-wrap"><input type="number" id="wage" value="3500000" step="100000"><span class="unit">원</span></div></div>
<div class="field"><label>상여금 연간 총액 (퇴직금 산입)</label><div class="input-wrap"><input type="number" id="bonus" value="0" step="100000"><span class="unit">원</span></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">👔</div><div>근무 기간을 입력하고 계산하세요</div></div></div>
</div>
<script>
function fw(n){if(n>=100000000)return(n/100000000).toFixed(1)+'억원';if(n>=10000)return Math.round(n/10000).toLocaleString()+'만원';return Math.round(n).toLocaleString()+'원'}
function calc(){
  const s=new Date(document.getElementById('st').value),e=new Date(document.getElementById('en').value);
  const days=Math.floor((e-s)/86400000),years=days/365;
  if(years<1){document.getElementById('res').innerHTML='<div class="ri danger" style="padding:24px;text-align:center;margin-top:20px"><div class="rl">퇴직금 미발생</div><div class="rv">근속 1년 미만</div></div>';return}
  const w=+document.getElementById('wage').value,b=+document.getElementById('bonus').value;
  const daily=(w+b/12)/30,ret=Math.round(daily*30*years);
  const yr=Math.floor(years),mo=Math.floor((years%1)*12);
  document.getElementById('res').innerHTML=`<div class="card-title">퇴직금 계산 결과</div>
  <div class="result-hero r2"><div class="ri info"><div class="rl">근속 기간</div><div class="rv">${yr}년 ${mo}개월</div></div><div class="ri"><div class="rl">일 평균임금</div><div class="rv">${fw(Math.round(daily))}</div></div><div class="ri hl" style="grid-column:1/-1"><div class="rl">법정 퇴직금</div><div class="rv" style="font-size:26px">${fw(ret)}</div><div class="rs">일 평균임금 × 30일 × ${years.toFixed(2)}년</div></div></div>
  <div style="background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.2);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--text-muted);line-height:1.8;font-family:DM Mono,monospace">💡 IRP 계좌 수령 시 퇴직소득세 30% 절감 가능</div>`
}
calc();
</script><!-- ADSENSE
