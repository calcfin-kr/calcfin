</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">RETURN RATE</div><h1>수익률 <span>계산기</span></h1><p>투자 원금과 현재 가치로 수익률과 손익을 계산합니다</p></div>
<div class="two-col">
<div class="card anim-1"><div class="card-title">투자 정보</div>
<div class="field"><label>투자 원금 (매수금액)</label><div class="input-wrap"><input type="number" id="buy" value="10000000" step="100000"><span class="unit">원</span></div></div>
<div class="field"><label>현재 가치 (매도금액)</label><div class="input-wrap"><input type="number" id="sell" value="13500000" step="100000"><span class="unit">원</span></div></div>
<div class="field"><label>투자 기간</label><div class="input-wrap"><input type="number" id="months" value="12" min="1"><span class="unit">개월</span></div></div>
<div class="field"><label>거래 비용 (수수료 등)</label><div class="input-wrap"><input type="number" id="fee" value="0" step="1000"><span class="unit">원</span></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">📊</div><div>정보를 입력하고 계산하세요</div></div></div>
</div>
<script>
function fw(n){return Math.round(n).toLocaleString()+'원'}
function calc(){
  const buy=+document.getElementById('buy').value,sell=+document.getElementById('sell').value,months=+document.getElementById('months').value,fee=+document.getElementById('fee').value;
  const profit=sell-buy-fee,rate=((profit/buy)*100).toFixed(2),annualRate=(rate/months*12).toFixed(2);
  const isProfit=profit>=0;
  document.getElementById('res').innerHTML=`<div class="card-title">수익률 계산 결과</div>
  <div class="result-hero r2"><div class="ri ${isProfit?'hl':'danger'}"><div class="rl">손익 금액</div><div class="rv">${isProfit?'+':''}${fw(profit)}</div></div><div class="ri ${isProfit?'gold':'danger'}"><div class="rl">수익률</div><div class="rv">${isProfit?'+':''}${rate}%</div></div><div class="ri info"><div class="rl">연 환산 수익률</div><div class="rv">${annualRate}%</div></div><div class="ri"><div class="rl">투자 기간</div><div class="rv">${months}개월</div></div></div>`
}
calc();
</script><!-- ADSENSE
