<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>대출 계산기 | CalcFin</title><meta name="description" content="원리금균등·원금균등·만기일시 대출 이자 계산"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"><link rel="stylesheet" href="common.css">

</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">LOAN CALCULATOR</div><h1>대출 <span>이자 계산기</span></h1><p>원리금균등 · 원금균등 · 만기일시 상환 방식별 월 납입금과 총 이자를 계산하세요</p></div>
<div class="two-col">
<div class="card anim-1"><div class="card-title">대출 정보 입력</div>
<div class="field"><label>대출 금액</label><div class="input-wrap"><input type="number" id="amt" value="30000000" step="1000000"><span class="unit">원</span></div><input type="range" id="amtR" min="1000000" max="100000000" step="1000000" value="30000000"><div class="slider-labels"><span>100만</span><span>1억</span></div></div>
<div class="field"><label>연 이자율</label><div class="input-wrap"><input type="number" id="rate" value="5.5" min="0.1" max="30" step="0.1"><span class="unit">%</span></div><input type="range" id="rateR" min="0.1" max="20" step="0.1" value="5.5"><div class="slider-labels"><span>0.1%</span><span>20%</span></div></div>
<div class="field"><label>대출 기간</label><div class="input-wrap"><input type="number" id="term" value="36" min="1" max="360"><span class="unit">개월</span></div><input type="range" id="termR" min="1" max="120" step="1" value="36"><div class="slider-labels"><span>1개월</span><span>120개월</span></div></div>
<div class="field"><label>상환 방식</label><div class="btn-group"><button class="btn-opt active" data-m="equal">원리금균등</button><button class="btn-opt" data-m="principal">원금균등</button><button class="btn-opt" data-m="bullet">만기일시</button></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="card-title">계산 결과</div><div class="empty-state"><div class="empty-icon">💳</div><div>정보를 입력하고 계산하세요</div></div></div>
</div>
<div class="card full-card anim-3" id="sch"><div class="empty-state"><div class="empty-icon">📊</div><div>상환 스케줄이 여기에 표시됩니다</div></div></div>
<script>
let method='equal';
const sy=(a,b)=>{document.getElementById(a).addEventListener('input',function(){document.getElementById(b).value=Math.min(this.value,document.getElementById(b).max)});document.getElementById(b).addEventListener('input',function(){document.getElementById(a).value=this.value})};
sy('amt','amtR');sy('rate','rateR');sy('term','termR');
document.querySelectorAll('.btn-opt').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.btn-opt').forEach(x=>x.classList.remove('active'));this.classList.add('active');method=this.dataset.m}));
function fw(n){if(n>=100000000)return(n/100000000).toFixed(1)+'억원';if(n>=10000)return Math.round(n/10000).toLocaleString()+'만원';return Math.round(n).toLocaleString()+'원'}
function calc(){
  const p=+document.getElementById('amt').value,ar=+document.getElementById('rate').value,m=+document.getElementById('term').value;
  if(!p||!ar||!m)return;
  const mr=ar/100/12;let sch=[],tp=0,ti=0;
  if(method==='equal'){const pay=p*mr*Math.pow(1+mr,m)/(Math.pow(1+mr,m)-1);let bal=p;for(let i=1;i<=m;i++){const int=bal*mr,prn=pay-int;bal-=prn;sch.push({i,pay:Math.round(pay),prn:Math.round(prn),int:Math.round(int),bal:Math.max(0,Math.round(bal))});tp+=pay;ti+=int}}
  else if(method==='principal'){const prn=p/m;let bal=p;for(let i=1;i<=m;i++){const int=bal*mr,pay=prn+int;bal-=prn;sch.push({i,pay:Math.round(pay),prn:Math.round(prn),int:Math.round(int),bal:Math.max(0,Math.round(bal))});tp+=pay;ti+=int}}
  else{const int=p*mr;for(let i=1;i<=m;i++){const pay=i===m?p+int:int;sch.push({i,pay:Math.round(pay),prn:i===m?Math.round(p):0,int:Math.round(int),bal:i===m?0:Math.round(p)});tp+=pay;ti+=int}}
  const ir=(ti/tp*100).toFixed(1);
  document.getElementById('res').innerHTML=`<div class="card-title">계산 결과</div><div class="result-hero r2"><div class="ri hl"><div class="rl">월 상환금(첫달)</div><div class="rv">${sch[0].pay.toLocaleString()}원</div></div><div class="ri"><div class="rl">총 상환금액</div><div class="rv">${fw(tp)}</div></div><div class="ri info"><div class="rl">대출 원금</div><div class="rv">${fw(p)}</div></div><div class="ri danger"><div class="rl">총 이자</div><div class="rv">${fw(ti)}</div></div></div><div class="prog-wrap"><div class="prog-labels"><span>원금 ${(100-+ir).toFixed(1)}%</span><span>이자 ${ir}%</span></div><div class="prog-track"><div class="prog-fill" id="pf" style="background:linear-gradient(90deg,var(--accent2),var(--danger))"></div></div></div>`;
  setTimeout(()=>{document.getElementById('pf').style.width=ir+'%'},100);
  const rows=sch.slice(0,Math.min(12,m)).map(r=>`<tr><td>${r.i}회</td><td>${r.pay.toLocaleString()}</td><td class="td-b">${r.prn.toLocaleString()}</td><td class="td-d">${r.int.toLocaleString()}</td><td class="td-m">${r.bal.toLocaleString()}</td></tr>`).join('');
  document.getElementById('sch').innerHTML=`<div class="section-title">월별 상환 스케줄 ${m>12?'(상위 12개월)':''}</div><div class="table-wrap"><table><thead><tr><th>회차</th><th>상환금(원)</th><th>원금(원)</th><th>이자(원)</th><th>잔액(원)</th></tr></thead><tbody>${rows}</tbody></table></div>`
}
calc();
</script><!-- ADSENSE
