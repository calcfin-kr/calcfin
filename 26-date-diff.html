<div class="two-col"><div class="card anim-1"><div class="card-title">날짜 입력</div>
<div class="field"><label>시작 날짜</label><div class="input-wrap"><input type="date" id="s" style="padding-right:14px;font-size:14px"></div></div>
<div class="field"><label>종료 날짜</label><div class="input-wrap"><input type="date" id="e" style="padding-right:14px;font-size:14px"></div></div>
<div class="field"><label>포함 기준</label><div class="btn-group"><button class="btn-opt active" data-i="0">시작일 미포함</button><button class="btn-opt" data-i="1">시작일 포함</button></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">📅</div><div>두 날짜를 입력하고 계산하세요</div></div></div></div>
<script>
let inc=0;document.querySelectorAll('[data-i]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-i]').forEach(x=>x.classList.remove('active'));this.classList.add('active');inc=+this.dataset.i}));
const now=new Date();
document.getElementById('s').valueAsDate=new Date(now.getFullYear(),now.getMonth(),1);
document.getElementById('e').valueAsDate=now;
function calc(){
  const s=new Date(document.getElementById('s').value),e=new Date(document.getElementById('e').value);if(isNaN(s)||isNaN(e))return;
  const days=Math.abs(Math.floor((e-s)/86400000))+inc;
  const weeks=(days/7).toFixed(1),months=(days/30.44).toFixed(1),years=(days/365.25).toFixed(2);
  document.getElementById('res').innerHTML=`<div class="card-title">날짜 차이 결과</div><div class="result-hero r2"><div class="ri hl"><div class="rl">일수</div><div class="rv">${days.toLocaleString()}일</div></div><div class="ri"><div class="rl">주</div><div class="rv">${weeks}주</div></div><div class="ri info"><div class="rl">개월</div><div class="rv">${months}개월</div></div><div class="ri gold"><div class="rl">년</div><div class="rv">${years}년</div></div></div>`
}calc();</script><!-- ADSENSE
