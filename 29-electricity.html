</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">ELECTRICITY BILL</div><h1>전기요금 <span>계산기</span></h1><p>가정용 전력 사용량 기반 전기요금을 계산합니다</p></div>
<div class="two-col"><div class="card anim-1"><div class="card-title">사용량 정보</div>
<div class="field"><label>월 사용량</label><div class="input-wrap"><input type="number" id="kwh" value="350" min="0" max="2000"><span class="unit">kWh</span></div><input type="range" id="kwhR" min="0" max="1000" step="10" value="350"><div class="slider-labels"><span>0</span><span>1,000kWh</span></div></div>
<div class="field"><label>계약 종류</label><div class="btn-group"><button class="btn-opt active" data-t="home">주택용 (저압)</button><button class="btn-opt" data-t="home_high">주택용 (고압)</button></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">⚡</div><div>사용량을 입력하고 계산하세요</div></div></div></div>
<script>
let ttype='home';
document.querySelectorAll('[data-t]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-t]').forEach(x=>x.classList.remove('active'));this.classList.add('active');ttype=this.dataset.t}));
const sy=(a,b)=>{document.getElementById(a).addEventListener('input',function(){document.getElementById(b).value=Math.min(this.value,document.getElementById(b).max)});document.getElementById(b).addEventListener('input',function(){document.getElementById(a).value=this.value})};
sy('kwh','kwhR');
function fw(n){return Math.round(n).toLocaleString()+'원'}
function calc(){
  const kwh=+document.getElementById('kwh').value;
  // 2024년 기준 주택용 누진제
  let charge=0;
  if(kwh<=200)charge=kwh*120.0;
  else if(kwh<=400)charge=200*120.0+(kwh-200)*214.6;
  else charge=200*120.0+200*214.6+(kwh-400)*307.3;
  const base=ttype==='home'?910:1600;
  const power=Math.round(charge);
  const climate=Math.round(kwh*9.0);
  const fuel=Math.round(kwh*5.0);
  const sub=base+power+climate+fuel;
  const vat=Math.round(sub*0.1),fund=Math.round(sub*0.037);
  const total=sub+vat+fund;
  document.getElementById('res').innerHTML=`<div class="card-title">전기요금 계산 결과</div><div class="result-hero r2"><div class="ri hl"><div class="rl">예상 청구액</div><div class="rv">${fw(total)}</div></div><div class="ri"><div class="rl">전력량 요금</div><div class="rv">${fw(power)}</div></div><div class="ri info"><div class="rl">부가가치세 (10%)</div><div class="rv">${fw(vat)}</div></div><div class="ri"><div class="rl">기본요금</div><div class="rv">${fw(base)}</div></div></div>
  <div style="background:rgba(240,192,64,.06);border:1px solid rgba(240,192,64,.2);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--text-muted);line-height:1.8;font-family:DM Mono,monospace">⚡ 한전 요금 기준 2024년 · 실제 청구액과 차이가 있을 수 있습니다</div>`
}calc();</script><!-- ADSENSE
