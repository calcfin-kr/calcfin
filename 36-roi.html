</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">ROI CALCULATOR</div><h1>ROI <span>계산기</span></h1><p>투자 대비 수익률(ROI)을 계산합니다</p></div>
<div class="two-col"><div class="card anim-1"><div class="card-title">투자 정보</div>
<div class="field"><label>투자 비용 (총 투자금)</label><div class="input-wrap"><input type="number" id="cost" value="10000000" step="100000"><span class="unit">원</span></div></div>
<div class="field"><label>투자로 인한 수익</label><div class="input-wrap"><input type="number" id="gain" value="14000000" step="100000"><span class="unit">원</span></div></div>
<div class="field"><label>투자 기간</label><div class="input-wrap"><input type="number" id="months" value="12" min="1"><span class="unit">개월</span></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">🎯</div><div>투자 정보를 입력하고 계산하세요</div></div></div></div>
<script>
function fw(n){return Math.round(n).toLocaleString()+'원'}
function calc(){
  const cost=+document.getElementById('cost').value,gain=+document.getElementById('gain').value,months=+document.getElementById('months').value;
  const profit=gain-cost,roi=((profit/cost)*100).toFixed(2),annualROI=(roi/months*12).toFixed(2);
  const isPos=profit>=0;
  document.getElementById('res').innerHTML=`<div class="card-title">ROI 계산 결과</div><div class="result-hero r2"><div class="ri ${isPos?'hl':'danger'}"><div class="rl">ROI</div><div class="rv">${isPos?'+':''}${roi}%</div></div><div class="ri ${isPos?'gold':'danger'}"><div class="rl">순이익</div><div class="rv">${isPos?'+':''}${fw(profit)}</div></div><div class="ri info"><div class="rl">연환산 ROI</div><div class="rv">${annualROI}%</div></div><div class="ri"><div class="rl">수익/투자 배수</div><div class="rv">${(gain/cost).toFixed(2)}x</div></div></div>`
}calc();</script><!-- ADSENSE
