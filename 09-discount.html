<div class="two-col">
<div class="card anim-1"><div class="card-title">할인 정보</div>
<div class="field"><label>계산 방식</label><div class="btn-group"><button class="btn-opt active" data-m="price2disc">정가+할인율 → 할인가</button><button class="btn-opt" data-m="disc2rate">정가+할인가 → 할인율</button></div></div>
<div class="field"><label>정가 (원래 가격)</label><div class="input-wrap"><input type="number" id="orig" value="50000" step="1000"><span class="unit">원</span></div></div>
<div class="field" id="rateField"><label>할인율</label><div class="input-wrap"><input type="number" id="rate" value="30" min="0" max="100" step="1"><span class="unit">%</span></div><input type="range" id="rateR" min="0" max="100" step="1" value="30"><div class="slider-labels"><span>0%</span><span>100%</span></div></div>
<div class="field" id="discField" style="display:none"><label>할인가</label><div class="input-wrap"><input type="number" id="disc" value="35000" step="1000"><span class="unit">원</span></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">🏷️</div><div>정보를 입력하고 계산하세요</div></div></div>
</div>
<script>
let mode='price2disc';
document.querySelectorAll('[data-m]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-m]').forEach(x=>x.classList.remove('active'));this.classList.add('active');mode=this.dataset.m;document.getElementById('rateField').style.display=mode==='price2disc'?'':'none';document.getElementById('discField').style.display=mode==='disc2rate'?'':'none'}));
const sy=(a,b)=>{document.getElementById(a).addEventListener('input',function(){document.getElementById(b).value=Math.min(this.value,document.getElementById(b).max)});document.getElementById(b).addEventListener('input',function(){document.getElementById(a).value=this.value})};
sy('rate','rateR');
function fw(n){return Math.round(n).toLocaleString()+'원'}
function calc(){
  const orig=+document.getElementById('orig').value;
  let rate,discPrice,savedAmt;
  if(mode==='price2disc'){rate=+document.getElementById('rate').value;discPrice=Math.round(orig*(1-rate/100));savedAmt=orig-discPrice}
  else{discPrice=+document.getElementById('disc').value;savedAmt=orig-discPrice;rate=((savedAmt/orig)*100).toFixed(1)}
  document.getElementById('res').innerHTML=`<div class="card-title">할인 계산 결과</div>
  <div class="result-hero r2"><div class="ri"><div class="rl">정가</div><div class="rv">${fw(orig)}</div></div><div class="ri danger"><div class="rl">할인율</div><div class="rv">${rate}%</div></div><div class="ri gold"><div class="rl">절약 금액</div><div class="rv">${fw(savedAmt)}</div></div><div class="ri hl"><div class="rl">할인가</div><div class="rv">${fw(discPrice)}</div></div></div>`
}
calc();
</script><!-- ADSENSE
