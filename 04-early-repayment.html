<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>중도상환 수수료 계산기 | CalcFin</title><meta name="description" content="대출 중도상환 수수료와 절약 이자를 계산하세요."><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"><link rel="stylesheet" href="common.css"></head>
<body>
<nav class="site-nav"><div class="site-nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><div class="nav-links"><a href="index.html#loan" class="nav-link active">대출</a><a href="index.html#tax" class="nav-link">세금</a><a href="index.html#salary" class="nav-link">급여</a><a href="index.html#realestate" class="nav-link">부동산</a><a href="index.html#investment" class="nav-link">투자</a></div></div></nav>
<div class="container">
<div class="page-header"><div class="header-badge">EARLY REPAYMENT CALCULATOR</div><h1>중도상환 수수료 <span>계산기</span></h1><p>대출 잔액·경과 기간별 중도상환 수수료와 절약 이자 비교 분석</p></div>
<div class="two-col">
  <div class="card anim-1">
    <div class="card-title">대출 정보</div>
    <div class="field"><label>현재 대출 잔액</label><div class="input-wrap"><input type="number" id="bal" value="50000000" step="1000000"><span class="unit">원</span></div></div>
    <div class="field"><label>중도상환 금액</label><div class="input-wrap"><input type="number" id="repay" value="20000000" step="1000000"><span class="unit">원</span></div></div>
    <div class="field"><label>대출 실행일로부터 경과 개월</label><div class="input-wrap"><input type="number" id="elapsed" value="12" min="1" max="36"><span class="unit">개월</span></div></div>
    <div class="field"><label>중도상환 수수료율</label><div class="input-wrap"><input type="number" id="feeRate" value="1.4" min="0" max="3" step="0.1"><span class="unit">%</span></div><div style="font-size:11px;color:var(--text-muted);margin-top:6px;font-family:'DM Mono',monospace;">일반 시중은행 기준 1.2~1.5% (3년 이내)</div></div>
    <div class="field"><label>연 이자율</label><div class="input-wrap"><input type="number" id="rate" value="5.0" min="0.1" max="20" step="0.1"><span class="unit">%</span></div></div>
    <div class="field"><label>남은 대출 기간</label><div class="input-wrap"><input type="number" id="remain" value="24" min="1" max="360"><span class="unit">개월</span></div></div>
    <button class="calc-btn" onclick="calc()">계산하기</button>
  </div>
  <div class="card anim-2" id="result">
    <div class="card-title">수수료 vs 절약 분석</div>
    <div class="empty-state"><div class="empty-icon">⚡</div><div class="empty-text">정보를 입력하고 중도상환 여부를 판단하세요</div></div>
  </div>
</div>
<div class="ad-banner">📢 GOOGLE ADSENSE 광고 영역 (728×90)</div>
<div class="related-grid">
  <a href="01-credit-loan.html" class="related-link">💳 신용대출 이자 계산기<span class="arrow">→</span></a>
  <a href="02-mortgage.html" class="related-link">🏠 주택담보대출 계산기<span class="arrow">→</span></a>
  <a href="05-loan-compare.html" class="related-link">⚖️ 대출 금리 비교<span class="arrow">→</span></a>
</div>
<div class="site-footer">© 2025 CalcFin · 참고용 계산기입니다</div>
</div>
<script>
function fw(n){if(n>=100000000)return(n/100000000).toFixed(1)+'억원';if(n>=10000)return Math.round(n/10000).toLocaleString()+'만원';return n.toLocaleString()+'원';}
function calc(){
  const bal=parseFloat(document.getElementById('bal').value)||0;
  const repay=parseFloat(document.getElementById('repay').value)||0;
  const elapsed=parseInt(document.getElementById('elapsed').value)||0;
  const feeRate=parseFloat(document.getElementById('feeRate').value)||0;
  const rate=parseFloat(document.getElementById('rate').value)||0;
  const remain=parseInt(document.getElementById('remain').value)||0;
  const remainMonths=Math.max(0,36-elapsed);
  const adjRate=feeRate*(remainMonths/36);
  const fee=Math.round(repay*adjRate/100);
  const savedInterest=Math.round(repay*rate/100/12*remain);
  const net=savedInterest-fee;
  const worth=net>0;
  document.getElementById('result').innerHTML=`
  <div class="card-title">수수료 vs 절약 분석</div>
  <div class="result-hero result-grid-2">
    <div class="result-item danger"><div class="result-label">중도상환 수수료</div><div class="result-value">${fw(fee)}</div><div class="result-sub">실효율 ${adjRate.toFixed(2)}%</div></div>
    <div class="result-item highlight"><div class="result-label">절약 이자 (잔여기간)</div><div class="result-value">${fw(savedInterest)}</div><div class="result-sub">${remain}개월 기준</div></div>
    <div class="result-item ${worth?'info':'danger'}" style="grid-column:1/-1">
      <div class="result-label">순 이익 (절약이자 - 수수료)</div>
      <div class="result-value" style="font-size:26px">${worth?'+':''}${fw(net)}</div>
      <div class="result-sub" style="font-size:13px;margin-top:8px">${worth?'✅ 중도상환이 유리합니다':'❌ 중도상환이 불리합니다'}</div>
    </div>
  </div>
  <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:12px;color:var(--text-muted);line-height:1.8;font-family:'DM Mono',monospace;">
    💡 수수료 면제: 대출 후 3년 경과 시 수수료 없음<br>
    잔여 면제기간: ${Math.max(0,remainMonths)}개월 남음
  </div>`;
}
calc();
</script>
</body></html>
