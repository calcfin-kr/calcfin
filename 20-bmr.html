</head><body><nav class="site-nav"><div class="nav-inner"><a href="index.html" class="site-logo">CALCFIN</a><a href="index.html" class="nav-home">← 전체 계산기</a></div></nav><div class="container"><div class="page-header"><div class="header-badge">BMR CALCULATOR</div><h1>기초대사량 <span>계산기</span></h1><p>해리스-베네딕트 공식으로 기초대사량을 계산합니다</p></div>
<div class="two-col"><div class="card anim-1"><div class="card-title">신체 정보</div>
<div class="field"><label>성별</label><div class="btn-group"><button class="btn-opt active" data-g="m">남성</button><button class="btn-opt" data-g="f">여성</button></div></div>
<div class="field"><label>나이</label><div class="input-wrap"><input type="number" id="age" value="30" min="10" max="90"><span class="unit">세</span></div></div>
<div class="field"><label>키</label><div class="input-wrap"><input type="number" id="h" value="175" min="100" max="220" step="0.5"><span class="unit">cm</span></div></div>
<div class="field"><label>몸무게</label><div class="input-wrap"><input type="number" id="w" value="70" min="20" max="200" step="0.5"><span class="unit">kg</span></div></div>
<div class="field"><label>활동 수준</label><div class="input-wrap"><select id="act"><option value="1.2">거의 없음 (사무직)</option><option value="1.375" selected>가벼운 운동 (주 1-3회)</option><option value="1.55">중간 운동 (주 3-5회)</option><option value="1.725">활발한 운동 (주 6-7회)</option><option value="1.9">매우 활발 (운동선수)</option></select></div></div>
<button class="calc-btn" onclick="calc()">계산하기</button></div>
<div class="card anim-2" id="res"><div class="empty-state"><div class="empty-icon">🔥</div><div>신체 정보를 입력하고 계산하세요</div></div></div></div>
<script>
let gender='m';document.querySelectorAll('[data-g]').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('[data-g]').forEach(x=>x.classList.remove('active'));this.classList.add('active');gender=this.dataset.g}));
function calc(){
  const age=+document.getElementById('age').value,h=+document.getElementById('h').value,w=+document.getElementById('w').value,act=+document.getElementById('act').value;
  const bmr=gender==='m'?88.362+13.397*w+4.799*h-5.677*age:447.593+9.247*w+3.098*h-4.330*age;
  const tdee=Math.round(bmr*act);
  document.getElementById('res').innerHTML=`<div class="card-title">기초대사량 결과</div><div class="result-hero r2"><div class="ri hl"><div class="rl">기초대사량 (BMR)</div><div class="rv">${Math.round(bmr)} kcal</div></div><div class="ri gold"><div class="rl">일일 소비 칼로리 (TDEE)</div><div class="rv">${tdee} kcal</div></div><div class="ri info"><div class="rl">다이어트 (△500)</div><div class="rv">${tdee-500} kcal</div></div><div class="ri danger"><div class="rl">벌크업 (＋500)</div><div class="rv">${tdee+500} kcal</div></div></div>`
}calc();</script><!-- ADSENSE
